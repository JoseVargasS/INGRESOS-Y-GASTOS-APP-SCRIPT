<script>
// ============================================
// BUCKS MANAGER - SCRIPTS MEJORADOS
// ============================================

// Global State
let currentTheme = localStorage.getItem('bucks_theme') || 'dark';
var currentYear = 2026;
var currentMonth = 0;
var transactionCache = [];
var summaries = [];
var currentSort = { col: 'date', order: 'desc' };
var deleteRowId = null;
var myChart = null;

var lastDeletedTransaction = null;
var undoTimeout = null;

const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

// DOM Elements
const tabButtons = document.querySelectorAll('.nav-item');
const contentViews = document.querySelectorAll('.content-view');
const fabAdd = document.getElementById('fabAdd');
const fabUndo = document.getElementById('fabUndo');
const addModal = document.getElementById('addModal');
const deleteModal = document.getElementById('deleteModal');
const closeModal = document.getElementById('closeModal');
const btnCancel = document.getElementById('btnCancel');
const btnCancelDelete = document.getElementById('btnCancelDelete');
const btnConfirmDelete = document.getElementById('btnConfirmDelete');
const addForm = document.getElementById('addForm');
const inputAmount = document.getElementById('inputAmount');
const inputType = document.getElementById('inputType');

// Freq Income Modal Elements
const freqIncomeModal = document.getElementById('freqIncomeModal');
const closeFreqIncomeModal = document.getElementById('closeFreqIncomeModal');
const btnCancelFreqIncome = document.getElementById('btnCancelFreqIncome');
const freqIncomeForm = document.getElementById('freqIncomeForm');
const inputFreqIncomeAmount = document.getElementById('inputFreqIncomeAmount');
const btnEditFreqIncome = document.getElementById('btnEditFreqIncome');
const freqIncomeMonthLabel = document.getElementById('freqIncomeMonthLabel');

// Navigation
const prevMonthBtn = document.getElementById('prevMonthBtn');
const nextMonthBtn = document.getElementById('nextMonthBtn');
const currentMonthDisplay = document.getElementById('currentMonthDisplay');
const goToCurrentMonthBtn = document.getElementById('goToCurrentMonthBtn');
const yearSelect = document.getElementById('yearSelect');
const quickMonthChips = document.querySelectorAll('.month-chip');

// Mobile Navigation
const yearSelectMobile = document.getElementById('yearSelectMobile');
const prevMonthBtnMobile = document.getElementById('prevMonthBtnMobile');
const nextMonthBtnMobile = document.getElementById('nextMonthBtnMobile');
const currentMonthDisplayMobile = document.getElementById('currentMonthDisplayMobile');
const goToCurrentMonthBtnMobile = document.getElementById('goToCurrentMonthBtnMobile');

// Sidebar
const sidebarToggle = document.getElementById('sidebarToggle');
const appSidebar = document.getElementById('appSidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');

// ============================================
// INICIALIZACIÓN
// ============================================
document.addEventListener('DOMContentLoaded', function() {
  initTheme();
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  
  updateYearUI(currentYear);
  if(yearSelectMobile) yearSelectMobile.value = currentYear;
  
  updateHeaderDate();
  loadTransactions();
  loadSummary();
  setupEventListeners();
});

// ============================================
// TOAST NOTIFICATIONS
// ============================================
function showToast(message, type = 'info', title = '') {
  const container = document.getElementById('toastContainer');
  
  const icons = {
    success: 'fa-check-circle',
    error: 'fa-exclamation-circle',
    info: 'fa-info-circle'
  };
  
  const titles = {
    success: title || 'Éxito',
    error: title || 'Error',
    info: title || 'Información'
  };
  
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.innerHTML = `
    <div class="toast-icon">
      <i class="fa-solid ${icons[type]}"></i>
    </div>
    <div class="toast-content">
      <div class="toast-title">${titles[type]}</div>
      <div class="toast-message">${message}</div>
    </div>
    <button class="toast-close" onclick="this.parentElement.remove()">
      <i class="fa-solid fa-times"></i>
    </button>
  `;
  
  container.appendChild(toast);
  
  // Auto-remove after 4 seconds
  setTimeout(() => {
    toast.classList.add('hiding');
    setTimeout(() => toast.remove(), 300);
  }, 4000);
}

// ============================================
// EVENT LISTENERS
// ============================================
function setupEventListeners() {
  // Sidebar Mobile Toggle
  sidebarToggle.addEventListener('click', () => {
    appSidebar.classList.add('open');
    sidebarOverlay.classList.remove('hidden');
  });
  
  sidebarOverlay.addEventListener('click', () => {
    appSidebar.classList.remove('open');
    sidebarOverlay.classList.add('hidden');
  });

  // Navigation
  prevMonthBtn.addEventListener('click', () => changeMonth(-1));
  nextMonthBtn.addEventListener('click', () => changeMonth(1));
  
  goToCurrentMonthBtn.addEventListener('click', () => {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();
    updateYearUI(currentYear);
    if(yearSelectMobile) yearSelectMobile.value = currentYear;
    
    updateHeaderDate();
    loadTransactions();
    showToast(`Navegando a ${monthNames[currentMonth]} ${currentYear}`, 'info');
    document.querySelector('[data-tab="expenses"]').click();
  });
  
  // Custom Year Dropdown Setup
  setupYearDropdown();
  
  // Mobile Year Select Listener
  if (yearSelectMobile) {
    yearSelectMobile.addEventListener('change', () => {
      currentYear = parseInt(yearSelectMobile.value);
      updateYearUI(currentYear);
      updateHeaderDate();
      loadTransactions();
    });
  }

  if (prevMonthBtnMobile) prevMonthBtnMobile.addEventListener('click', () => changeMonth(-1));
  if (nextMonthBtnMobile) nextMonthBtnMobile.addEventListener('click', () => changeMonth(1));
  
  if (goToCurrentMonthBtnMobile) {
    goToCurrentMonthBtnMobile.addEventListener('click', () => {
      const now = new Date();
      currentYear = now.getFullYear();
      currentMonth = now.getMonth();
      
      updateYearUI(currentYear);
      if(yearSelectMobile) yearSelectMobile.value = currentYear;

      updateHeaderDate();
      loadTransactions();
      document.querySelector('[data-tab="expenses"]').click();
    });
  }
  
  // Quick Months
  quickMonthChips.forEach(chip => {
    chip.addEventListener('click', () => {
      currentMonth = parseInt(chip.getAttribute('data-month'));
      updateHeaderDate();
      loadTransactions();
      
      // Close sidebar on mobile
      if (window.innerWidth <= 768) {
        appSidebar.classList.remove('open');
        sidebarOverlay.classList.add('hidden');
      }
      
      // Navigate down to expenses tab
      const expenseTab = document.querySelector('.nav-item[data-tab="expenses"]');
      if (expenseTab) {
         expenseTab.click();
      } else {
         const fallback = document.querySelector('[data-tab="expenses"]');
         if (fallback) fallback.click();
      }
    });
  });

  // Tabs
  tabButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      tabButtons.forEach(b => b.classList.remove('active'));
      contentViews.forEach(v => v.classList.remove('active'));
      
      btn.classList.add('active');
      const tabName = btn.getAttribute('data-tab');
      document.getElementById('view-' + tabName).classList.add('active');
      
      // Update page title
      const titles = {
        'expenses': 'Tabla de Gastos',
        'summary': 'Resumen Anual',
        'charts': 'Gráficos Anuales'
      };
      document.getElementById('pageTitle').textContent = titles[tabName];
      const subtitleEl = document.getElementById('pageSubtitle');
      if (tabName === 'expenses') {
        subtitleEl.style.display = 'block';
      } else {
        subtitleEl.style.display = 'none';
      }
      
      const mobileControls = document.querySelector('.mobile-controls');
      if (tabName === 'charts') {
        setTimeout(renderCharts, 100);
        if (mobileControls) mobileControls.classList.add('hidden-nav');
      } else if (tabName === 'summary') {
        setTimeout(() => renderSummaryTable(summaries), 100);
        if (mobileControls) mobileControls.classList.add('hidden-nav');
      } else {
        // Mostrar controles de navegación de fecha solo en la pestaña expenses en móvil
        if (mobileControls) {
          if (tabName === 'expenses') {
            mobileControls.classList.remove('hidden-nav');
          } else {
            mobileControls.classList.add('hidden-nav');
          }
        }
      }
      
      // Close sidebar automatically on mobile
      if (!sidebarOverlay.classList.contains('hidden')) {
        appSidebar.classList.remove('open');
        sidebarOverlay.classList.add('hidden');
      }
    });
  });

  // Setup Theme Toggle Listener
  const themeToggleParamBtn = document.getElementById('themeToggleBtn');
  if (themeToggleParamBtn) {
    themeToggleParamBtn.addEventListener('click', toggleTheme);
  }
  
  // Sorting Headers
  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.getAttribute('data-sort');
      if (currentSort.col === col) {
        currentSort.order = currentSort.order === 'desc' ? 'asc' : 'desc';
      } else {
        currentSort.col = col;
        currentSort.order = 'desc';
      }
      sortAndRender();
    });
  });

  // Modal
  fabAdd.addEventListener('click', () => openModal());

  const hideModal = () => {
    addModal.classList.add('hidden');
    setTimeout(() => addForm.reset(), 300);
  };
  
  closeModal.addEventListener('click', hideModal);
  btnCancel.addEventListener('click', hideModal);
  
  // Delete Modal
  btnCancelDelete.addEventListener('click', () => {
    deleteModal.classList.add('hidden');
    deleteRowId = null;
  });
  
  btnConfirmDelete.addEventListener('click', () => {
    if (deleteRowId) {
      confirmDelete(deleteRowId);
    }
  });

  // Math Input Logic
  inputAmount.addEventListener('input', () => {
    const val = inputAmount.value;
    const result = calculateExpression(val);
    
    const previewEl = document.getElementById('mathPreviewResult');
    
    if (result !== null && !isNaN(result) && isFinite(result)) {
      if (val.match(/[+\-*/]/)) {
        previewEl.textContent = '= ' + result.toFixed(2);
        previewEl.style.display = 'block';
        
        // CORRECCIÓN: Color dinámico según el signo
        if (result < 0) {
          previewEl.style.color = 'var(--accent-red)';
        } else if (result > 0) {
          previewEl.style.color = 'var(--accent-green)';
        } else {
          previewEl.style.color = 'var(--text-primary)';
        }
      } else {
        previewEl.style.display = 'none';
      }
      
      if (editMode === false) {
        const currentType = inputType.value;
        const isCurrentlyIncome = currentType.startsWith('INGRESO');
        const isCurrentlyFrec = currentType.includes('FRECUENTE') && !currentType.includes('NO');
        
        // Solo auto-cambiar si hay un cambio de polaridad (positivo/negativo)
        // pero preservando la preferencia de FRECUENTE vs NO FRECUENTE
        if (result > 0 && !isCurrentlyIncome) {
          // Cambiar de gasto a ingreso, preservando la frecuencia
          const newType = isCurrentlyFrec ? 'INGRESO FRECUENTE' : 'INGRESO NO FRECUENTE';
          if (window.setDropdownValue) window.setDropdownValue(newType);
          else inputType.value = newType;
        } else if (result <= 0 && isCurrentlyIncome) {
          // Cambiar de ingreso a gasto, preservando la frecuencia
          const newType = isCurrentlyFrec ? 'GASTO FRECUENTE' : 'GASTO NO FRECUENTE';
          if (window.setDropdownValue) window.setDropdownValue(newType);
          else inputType.value = newType;
        }
      }
    } else {
      previewEl.textContent = '';
      previewEl.style.display = 'none';
    }
  });

  // Chart Filter Listener
  const chartMetricSelect = document.getElementById('chartMetricSelect');
  if (chartMetricSelect) {
    chartMetricSelect.addEventListener('change', () => {
      renderCharts();
    });
  }

  // Freq Income Additions
  
  const hideFreqModal = () => {
    freqIncomeModal.classList.add('hidden');
    freqIncomeForm.reset();
  };

  btnEditFreqIncome.addEventListener('click', openFreqIncomeModal);
  closeFreqIncomeModal.addEventListener('click', hideFreqModal);
  btnCancelFreqIncome.addEventListener('click', hideFreqModal);
  freqIncomeForm.addEventListener('submit', handleFreqIncomeSubmit);
  
  if(fabUndo) fabUndo.addEventListener('click', undoDelete);

  // Form Submit
  addForm.addEventListener('submit', handleFormSubmit);
  
  // Custom Dropdown Logic
  setupCustomDropdown();
  
  // Date Picker Input Trigger
  const dateInput = document.getElementById('inputDate');
  const calendarIcon = document.getElementById('calendarIcon');
  if (calendarIcon && dateInput.showPicker) {
    calendarIcon.addEventListener('click', () => {
      dateInput.showPicker();
    });
  }
  
  // Close modals on escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      addModal.classList.add('hidden');
      deleteModal.classList.add('hidden');
      appSidebar.classList.remove('open');
      sidebarOverlay.classList.add('hidden');
    }
  });
  
  // Close dropdowns on outside click
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.custom-dropdown')) {
      document.querySelectorAll('.dropdown-options').forEach(el => {
        el.classList.add('hidden');
      });
      document.querySelectorAll('.dropdown-selected').forEach(el => {
        el.classList.remove('active');
      });
    }
  });

  // ============================================
  // CUSTOM KEYBOARD LOGIC (MOBILE)
  // ============================================
  const customKeyboard = document.getElementById('custom-calc-keyboard');

  inputAmount.addEventListener('focus', () => {
    if (window.innerWidth <= 768) {
      document.body.classList.add('keyboard-active');
      customKeyboard.classList.remove('hidden');
      
      // Integración con Back Button (History API)
      if (window.history.state?.keyboardOpen !== true) {
        window.history.pushState({ keyboardOpen: true }, '');
      }
      
      // Asegurar que el input sea visible después de que el teclado aparezca
      setTimeout(() => {
        inputAmount.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 300);
    }
  });

  inputAmount.addEventListener('blur', () => {
    // Pequeño delay para dejar que terminen las transiciones
    setTimeout(() => {
      document.body.classList.remove('keyboard-active');
      customKeyboard.classList.add('hidden');
      
      // Si el blur fue manual (Hecho o clic fuera) y el estado sigue siendo de teclado abierto, limpiar historial
      if (window.history.state?.keyboardOpen === true) {
        window.history.back();
      }
    }, 150);
  });

  // Manejar el botón de atrás del sistema/navegador
  window.addEventListener('popstate', (event) => {
    const isKeyboardOpen = !customKeyboard.classList.contains('hidden');
    if (isKeyboardOpen && (!event.state || event.state.keyboardOpen !== true)) {
      inputAmount.blur(); // El blur disparará el ocultamiento y la limpieza de clases
    }
  });

  // Prevenir que el input pierda el foco al tocar los botones del teclado custom
  customKeyboard.addEventListener('mousedown', (e) => {
    if (e.target.closest('.kb-btn')) {
      e.preventDefault(); // Mantiene el foco en el inputAmount
    }
  });
  
  // Soporte para touch
  customKeyboard.addEventListener('touchstart', (e) => {
    if (e.target.closest('.kb-btn')) {
      // No preventDefault aquí para permitir el click, pero el mousedown se encargará del foco
    }
  }, {passive: true});
}

// ============================================
// CUSTOM DROPDOWN
// ============================================
function setupCustomDropdown() {
  const dropdown = document.getElementById('typeDropdown');
  const selectedEl = document.getElementById('dropdownSelected');
  const optionsContainer = document.getElementById('dropdownOptions');
  const hiddenInput = document.getElementById('inputType');
  const selectedText = document.getElementById('selectedText');
  const selectedDot = document.getElementById('selectedDot');
  
  const options = [
    { val: 'GASTO NO FRECUENTE', label: 'Gasto No Frecuente', color: 'dot-yellow' },
    { val: 'GASTO FRECUENTE', label: 'Gasto Frecuente', color: 'dot-red' },
    { val: 'INGRESO NO FRECUENTE', label: 'Ingreso No Frecuente', color: 'dot-green' }
  ];
  
  optionsContainer.innerHTML = '';
  options.forEach(opt => {
    const div = document.createElement('div');
    // AGREGADO: Clase específica para sombra/color
    div.className = `dropdown-option opt-${opt.val.toLowerCase().replace(/\s+/g, '-')}`;
    div.dataset.value = opt.val;
    div.innerHTML = `<span class="dot-indicator ${opt.color}"></span> ${opt.label}`;
    div.addEventListener('click', () => selectOption(opt));
    optionsContainer.appendChild(div);
  });
  
  selectedEl.addEventListener('click', (e) => {
    e.stopPropagation();
    const isHidden = optionsContainer.classList.contains('hidden');
    
    // Close all other dropdowns
    document.querySelectorAll('.dropdown-options').forEach(el => el.classList.add('hidden'));
    document.querySelectorAll('.dropdown-selected').forEach(el => el.classList.remove('active'));
    
    if (isHidden) {
      optionsContainer.classList.remove('hidden');
      selectedEl.classList.add('active');
    } else {
      optionsContainer.classList.add('hidden');
      selectedEl.classList.remove('active');
    }
  });
  
  window.selectOption = function(optObj) {
    hiddenInput.value = optObj.val;
    selectedText.textContent = optObj.label;
    selectedDot.className = 'dot-indicator ' + optObj.color;
    
    // Update visual selection
    document.querySelectorAll('.dropdown-option').forEach(el => {
      el.classList.toggle('selected', el.dataset.value === optObj.val);
    });
    
    optionsContainer.classList.add('hidden');
    selectedEl.classList.remove('active');
  };
  
  const initial = options.find(o => o.val === hiddenInput.value) || options[0];
  selectOption(initial);
  
  window.setDropdownValue = function(val) {
    const found = options.find(o => o.val === val);
    if (found) selectOption(found);
  };
}

// ============================================
// YEAR DROPDOWN
// ============================================
function setupYearDropdown() {
  const wrapper = document.getElementById('yearDropdownWrapper');
  const head = document.getElementById('yearSelectedHead');
  const optionsContainer = document.getElementById('yearDropdownOptions');
  
  const years = [2026, 2025, 2024, 2023, 2022];
  
  optionsContainer.innerHTML = '';
  years.forEach(y => {
    const div = document.createElement('div');
    div.className = 'dropdown-option';
    div.innerHTML = `<span>${y}</span> <i class="fa-solid fa-check" style="opacity: ${currentYear === y ? 1 : 0}; color: var(--accent-green);"></i>`;
    
    div.addEventListener('click', () => {
      updateYearUI(y);
      if(yearSelectMobile) yearSelectMobile.value = y;
      updateHeaderDate();
      loadTransactions();
      
      Array.from(optionsContainer.children).forEach(child => {
        const icon = child.querySelector('.fa-check');
        if(icon) icon.style.opacity = child.textContent.includes(y.toString()) ? '1' : '0';
      });
      
      showToast(`Año cambiado a ${y}`, 'info');
    });
    
    optionsContainer.appendChild(div);
  });
  
  head.addEventListener('click', (e) => {
    e.stopPropagation();
    const isHidden = optionsContainer.classList.contains('hidden');
    
    document.querySelectorAll('.dropdown-options').forEach(el => el.classList.add('hidden'));
    
    if (isHidden) {
      optionsContainer.classList.remove('hidden');
      head.classList.add('active');
    } else {
      optionsContainer.classList.add('hidden');
      head.classList.remove('active');
    }
  });
  
  document.addEventListener('click', (e) => {
    if (!wrapper.contains(e.target)) {
      optionsContainer.classList.add('hidden');
      head.classList.remove('active');
    }
  });
}

// ============================================
// HELPERS
// ============================================
function updateYearUI(year) {
  const hidden = document.getElementById('yearSelect');
  const text = document.getElementById('yearSelectedText');
  const quickMonthsYearText = document.getElementById('quickMonthsYearText');
  if(hidden) hidden.value = year;
  if(text) text.textContent = year;
  if(quickMonthsYearText) quickMonthsYearText.textContent = ' ' + year;
  currentYear = year;
}

function updateHeaderDate() {
  currentMonthDisplay.textContent = monthNames[currentMonth];
  if(currentMonthDisplayMobile) currentMonthDisplayMobile.textContent = monthNames[currentMonth];
  document.getElementById('pageSubtitle').textContent = monthNames[currentMonth] + ' ' + currentYear;
  
  quickMonthChips.forEach(chip => {
    chip.classList.toggle('active', parseInt(chip.getAttribute('data-month')) === currentMonth);
  });
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) {
    currentMonth = 0;
    currentYear++;
    updateYearUI(currentYear);
    if(yearSelectMobile) yearSelectMobile.value = currentYear;
  } else if (currentMonth < 0) {
    currentMonth = 11;
    currentYear--;
    updateYearUI(currentYear);
    if(yearSelectMobile) yearSelectMobile.value = currentYear;
  }
  updateHeaderDate();
  loadTransactions();
}

function addMathSymbol(symbol) {
  const input = document.getElementById('inputAmount');
  const start = input.selectionStart;
  const end = input.selectionEnd;
  const text = input.value;
  
  // Insert symbol at cursor position
  input.value = text.substring(0, start) + symbol + text.substring(end);
  
  // Move cursor to after the inserted symbol
  const newPos = start + symbol.length;
  input.setSelectionRange(newPos, newPos);
  
  // Trigger input event for preview
  input.dispatchEvent(new Event('input', { bubbles: true }));
}

function clearAmount() {
  const input = document.getElementById('inputAmount');
  input.value = '';
  input.dispatchEvent(new Event('input', { bubbles: true }));
}

function deleteLastChar() {
  const input = document.getElementById('inputAmount');
  const start = input.selectionStart;
  const end = input.selectionEnd;
  const text = input.value;
  
  if (start === end) {
    if (start > 0) {
      input.value = text.substring(0, start - 1) + text.substring(end);
      input.setSelectionRange(start - 1, start - 1);
    }
  } else {
    input.value = text.substring(0, start) + text.substring(end);
    input.setSelectionRange(start, start);
  }
  input.dispatchEvent(new Event('input', { bubbles: true }));
}

function blurAmount() {
  document.getElementById('inputAmount').blur();
}

function calculateExpression(expression) {
  if (!expression) return 0;
  const cleanExpr = expression.replace(/[^0-9+\-*/.()]/g, '');
  try {
    return new Function('return ' + cleanExpr)();
  } catch (e) {
    return null;
  }
}

function formatMoney(val) {
  if (!val) return 'S/ 0.00';
  const num = Number(val);
  if (isNaN(num)) return val;
  const prefix = num >= 0 ? 'S/ ' : '-S/ ';
  return prefix + Math.abs(num).toFixed(2);
}

function abbreviateType(type) {
  if (!type) return '';
  const map = {
    'GASTO NO FRECUENTE': 'G. No Frec.',
    'GASTO FRECUENTE': 'G. Frec.',
    'INGRESO NO FRECUENTE': 'Ing. No Frec.',
    'INGRESO FRECUENTE': 'Ing. Frec.'
  };
  return map[type] || type;
}

// ============================================
// SORTING
// ============================================
function sortAndRender() {
  if (!transactionCache) return;
  
  transactionCache.sort((a, b) => {
    let valA, valB;
    
    if (currentSort.col === 'date') {
      valA = new Date(a.rawDate).getTime();
      valB = new Date(b.rawDate).getTime();
    } else if (currentSort.col === 'amount') {
      valA = parseFloat(a.amount);
      valB = parseFloat(b.amount);
    } else if (currentSort.col === 'type') {
      valA = a.type.toLowerCase();
      valB = b.type.toLowerCase();
    } else if (currentSort.col === 'detail') {
      valA = a.detail.toLowerCase();
      valB = b.detail.toLowerCase();
    }
    
    if (valA < valB) return currentSort.order === 'asc' ? -1 : 1;
    if (valA > valB) return currentSort.order === 'asc' ? 1 : -1;
    return 0;
  });
  
  document.querySelectorAll('th i').forEach(icon => icon.className = 'fa-solid fa-sort');
  const activeTh = document.querySelector(`th[data-sort="${currentSort.col}"]`);
  if (activeTh) {
    const icon = activeTh.querySelector('i');
    if (icon) {
      icon.className = `fa-solid fa-sort-${currentSort.order === 'asc' ? 'up' : 'down'}`;
    }
  }

  renderTransactions(transactionCache, false);
}

// ============================================
// TRANSACTIONS
// ============================================
function loadTransactions() {
  const tbody = document.getElementById('transactionsTableBody');
  tbody.innerHTML = `
    <tr>
      <td colspan="5" class="loading-text">
        <div class="loading-spinner"></div>
        Cargando datos...
      </td>
    </tr>
  `;

  google.script.run
    .withSuccessHandler(renderTransactions)
    .withFailureHandler((error) => {
      tbody.innerHTML = `
        <tr>
          <td colspan="5" style="text-align:center; padding: 30px; color: var(--accent-red);">
            <i class="fa-solid fa-exclamation-circle" style="font-size: 24px; margin-bottom: 10px;"></i><br>
            Error al cargar datos
          </td>
        </tr>
      `;
      showToast('Error al cargar transacciones: ' + error.message, 'error');
    })
    .getTransactions(currentMonth, currentYear);
}

function renderTransactions(data, updateCache = true) {
  if (updateCache) transactionCache = data;
  
  if (updateCache) {
    sortAndRender();
    return;
  }
  
  const tbody = document.getElementById('transactionsTableBody');
  tbody.innerHTML = '';
  
  let totalIncome = 0;
  let totalExpense = 0;
  let freqExpense = 0;
  let noFreqExpense = 0;
  let noFreqIncome = 0;

  // Filtrar 'INGRESO FRECUENTE' de la tabla para no mostrarlo
  const filteredData = data.filter(t => t.type !== 'INGRESO FRECUENTE');

  if (!filteredData || filteredData.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="5" style="text-align:center; padding: 40px; color: var(--text-secondary);">
          <i class="fa-solid fa-inbox" style="font-size: 32px; margin-bottom: 15px; opacity: 0.5;"></i><br>
          No hay movimientos en este mes
        </td>
      </tr>
    `;
    updateHeaderStats(0, 0, 0, 0, 0);
    return;
  }

  filteredData.forEach(tx => {
    const amt = Number(tx.amount);
    if (amt > 0) {
      totalIncome += amt;
      noFreqIncome += amt;
    }
    else {
      totalExpense += amt;
      if (tx.type === 'GASTO FRECUENTE') freqExpense += amt;
      else noFreqExpense += amt;
    }
    
    const row = document.createElement('tr');
    
    // CORRECCIÓN: Sombreado para todos los tipos
    if (tx.type === 'GASTO FRECUENTE') {
      row.className = 'row-gasto-frecuente';
    } else if (tx.type === 'INGRESO FRECUENTE') {
      row.className = 'row-ingreso-frecuente';
    } else if (tx.type === 'INGRESO NO FRECUENTE') {
      row.className = 'row-ingreso-no-frecuente';
    }
    
    let amountClass = '';
    if (amt >= 0) {
      amountClass = 'amount-positive';
    } else {
      amountClass = tx.type === 'GASTO FRECUENTE' ? 'amount-negative' : 'amount-neutral';
    }
    
    let typePillClass = 'pill-neutral';
    if (tx.type === 'GASTO FRECUENTE') typePillClass = 'pill-red';
    if (tx.type === 'INGRESO NO FRECUENTE') typePillClass = 'pill-green';

    const detailText = tx.detail || '';
    const detailHtml = `
      <div class="detail-wrapper">
        <div class="detail-content check-overflow" id="detail-${tx.rowId}">
          ${escapeHtml(detailText)}
        </div>
        <button class="btn-expand" style="display:none;" onclick="toggleDetail('${tx.rowId}', this)">+</button>
      </div>
    `;
    
    row.innerHTML = `
      <td style="white-space: nowrap;">
        <i class="fa-solid fa-grip-lines drag-handle"></i>
        ${tx.date}
      </td>
      <td class="${amountClass}">${amt >= 0 ? '+ S/ ' : '- S/ '} ${Math.abs(amt).toFixed(2)}</td>
      <td>${detailHtml}</td>
      <td><span class="${typePillClass}">${abbreviateType(tx.type)}</span></td>
      <td>
        <div class="action-buttons-wrapper">
          <button class="action-btn edit" onclick="startEdit(${tx.rowId})" title="Editar">
            <i class="fa-solid fa-pencil"></i>
          </button>
          <button class="action-btn delete" onclick="showDeleteModal(${tx.rowId})" title="Eliminar">
            <i class="fa-solid fa-trash"></i>
          </button>
        </div>
      </td>
    `;
    
    // Add Drag & Drop attributes
    row.draggable = true;
    row.dataset.rowId = tx.rowId;
    row.addEventListener('dragstart', handleDragStart);
    row.addEventListener('dragover', handleDragOver);
    row.addEventListener('dragleave', handleDragLeave);
    row.addEventListener('drop', handleDrop);
    row.addEventListener('dragend', handleDragEnd);
    
    // Add lifting visual feedback listeners
    const handle = row.querySelector('.drag-handle');
    if (handle) {
      const lift = () => row.classList.add('drag-lifted');
      const dropLift = () => row.classList.remove('drag-lifted');
      handle.addEventListener('mousedown', lift);
      handle.addEventListener('touchstart', lift, {passive: true});
      row.addEventListener('mouseup', dropLift);
      row.addEventListener('touchend', dropLift);
      row.addEventListener('dragend', dropLift);
    }
    
    tbody.appendChild(row);
  });
  
  updateHeaderStats(totalIncome, totalExpense, freqExpense, noFreqExpense, noFreqIncome);
  setTimeout(checkDetailOverflows, 0);
}

function updateHeaderStats(income, expense, freqExp, noFreqExp, noFreqInc) {
  // Extraer el Ingreso Frecuente directamente del objeto 'summaries'
  let freqInc = 0;
  const currMonthYearStr = monthNames[currentMonth] + " " + currentYear;
  if (summaries && summaries.length > 0) {
    const summaryRow = summaries.find(s => s.monthYear === currMonthYearStr);
    if (summaryRow) {
      freqInc = Number(summaryRow.freqIncome) || 0;
    }
  }

  // Sumar a los totales
  const finalIncome = Number(income) + freqInc;
  let balance = finalIncome + Number(expense);
  
  document.getElementById('statFreqIncome').innerText = '+ S/ ' + freqInc.toFixed(2);
  document.getElementById('statNoFreqIncome').innerText = '+ S/ ' + Math.abs(noFreqInc).toFixed(2);
  document.getElementById('statFreqExpense').innerText = '- S/ ' + Math.abs(freqExp).toFixed(2);
  document.getElementById('statNoFreqExpense').innerText = '- S/ ' + Math.abs(noFreqExp).toFixed(2);
  document.getElementById('statTotalExpense').innerText = '- S/ ' + Math.abs(expense).toFixed(2);
  document.getElementById('statBalance').innerText = (balance >= 0 ? '+ S/ ' : '- S/ ') + Math.abs(balance).toFixed(2);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ============================================
// DRAG & DROP LOGIC
// ============================================
let dragSrcEl = null;

function handleDragStart(e) {
  if (e.target.tagName.toLowerCase() !== 'tr') return;
  dragSrcEl = e.target;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', e.target.dataset.rowId);
  setTimeout(() => {
    e.target.classList.remove('drag-lifted');
    e.target.classList.add('dragging');
  }, 50);
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (dragSrcEl !== this) {
    document.querySelectorAll('#transactionsTableBody tr').forEach(r => r.classList.remove('drag-over'));
    this.classList.add('drag-over');
  }
  return false;
}

function handleDragLeave(e) {
  this.classList.remove('drag-over');
}

function handleDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  this.classList.remove('drag-over');
  document.querySelectorAll('#transactionsTableBody tr').forEach(r => r.classList.remove('drag-over'));
  
  if (dragSrcEl !== this) {
    const srcRowId = dragSrcEl.dataset.rowId;
    const targetRowId = this.dataset.rowId;
    
    // Swap contents in DOM instantly
    const srcHTML = dragSrcEl.innerHTML;
    dragSrcEl.innerHTML = this.innerHTML;
    this.innerHTML = srcHTML;
    
    // Swap dataset row IDs
    dragSrcEl.dataset.rowId = targetRowId;
    this.dataset.rowId = srcRowId;
    
    // Background update Google Script (Silently, no visual reload on success)
    google.script.run
      .withFailureHandler(err => {
         showToast('Error moviendo celda: ' + err.message, 'error');
         loadTransactions(); 
      })
      .swapTransactions(srcRowId, targetRowId);
  }
  return false;
}

function handleDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('#transactionsTableBody tr').forEach(row => {
    row.classList.remove('dragging');
  });
}



function confirmDelete(rowId) {
  const btn = document.querySelector(`button[onclick="showDeleteModal(${rowId})"]`);
  if (btn) {
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
    btn.disabled = true;
  }
  
  // Guardamos la transacción antes de eliminarla por si quieren deshacer
  lastDeletedTransaction = transactionCache.find(t => t.rowId === rowId);
  
  google.script.run
    .withSuccessHandler(() => {
      deleteModal.classList.add('hidden');
      
      if (deleteRowId) {
        transactionCache = transactionCache.filter(t => t.rowId !== deleteRowId);
        sortAndRender();
        loadSummary(); 
      }
      
      deleteRowId = null;
      showToast('Registro eliminado correctamente', 'success');
      
      // Mostrar y configurar el botón deshacer
      if(fabUndo && lastDeletedTransaction) {
        fabUndo.classList.remove('hidden');
        if(undoTimeout) clearTimeout(undoTimeout);
        undoTimeout = setTimeout(() => {
          fabUndo.classList.add('hidden');
          lastDeletedTransaction = null;
        }, 12000); // 12 seconds to undo
      }
    })
    .withFailureHandler((error) => {
      deleteModal.classList.add('hidden');
      if (btn) {
        btn.innerHTML = '<i class="fa-solid fa-trash"></i>';
        btn.disabled = false;
      }
      showToast('Error al eliminar: ' + error.message, 'error');
    })
    .deleteTransaction(rowId);
}

window.undoDelete = function() {
  if(!lastDeletedTransaction) return;
  
  // Ocultar botón inmediatamente
  fabUndo.classList.add('hidden');
  if(undoTimeout) clearTimeout(undoTimeout);
  
  // Convertir rawDate (ISO string) a formato YYYY-MM-DD que espera el server
  let dateStr = '';
  if (lastDeletedTransaction.rawDate) {
    const d = new Date(lastDeletedTransaction.rawDate);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    dateStr = `${yyyy}-${mm}-${dd}`;
  } else {
    // Si no hay rawDate intentamos construir: lastDeletedTransaction.date es "28-feb-26"
    const parts = lastDeletedTransaction.date.split('-');
    const mMap = { ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11 };
    if (parts.length === 3) {
      const mIndex = mMap[parts[1].toLowerCase()];
      let yr = parseInt(parts[2]);
      if (yr < 100) yr += 2000;
      const d = new Date(yr, mIndex, parseInt(parts[0]));
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      dateStr = `${yyyy}-${mm}-${dd}`;
    }
  }
  
  const txData = {
    date: dateStr,
    amount: lastDeletedTransaction.amount,
    detail: lastDeletedTransaction.detail,
    type: lastDeletedTransaction.type
  };
  
  const finishUndo = (restoredTransaction) => {
    if (restoredTransaction) {
      transactionCache.unshift(restoredTransaction);
      sortAndRender();
      loadSummary();
    } else {
      // Si la fecha no cae en el mes actual simplemente recargamos
      loadTransactions();
    }
    lastDeletedTransaction = null;
    showToast('Acción revertida correctamente', 'success');
  };
  
  google.script.run
    .withSuccessHandler(finishUndo)
    .withFailureHandler((err) => {
      showToast('Error al deshacer: ' + err.message, 'error');
    })
    .addTransactionOptimized(txData, currentMonth, currentYear);
}

function openModal(data = null) {
  addModal.classList.remove('hidden');
  addForm.reset();
  const previewEl = document.getElementById('mathPreviewResult');
  previewEl.textContent = '';
  previewEl.style.display = 'none';
  
  if (data) {
    editMode = true;
    document.getElementById('modalTitle').innerHTML = '<i class="fa-solid fa-pencil"></i> Editar Registro';
    document.getElementById('editRowId').value = data.rowId;
    
    if (data.rawDate) {
      const d = new Date(data.rawDate);
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      document.getElementById('inputDate').value = `${yyyy}-${mm}-${dd}`;
    }
    
    if (data.formula && data.formula.startsWith('=')) {
      document.getElementById('inputAmount').value = data.formula.substring(1);
    } else {
      document.getElementById('inputAmount').value = data.amount;
    }
    
    document.getElementById('inputDetail').value = data.detail;
    window.setDropdownValue(data.type);
    
    document.getElementById('btnSubmit').innerHTML = '<i class="fa-solid fa-save"></i> Guardar Cambios';
    
  } else {
    editMode = false;
    document.getElementById('modalTitle').innerHTML = '<i class="fa-solid fa-calculator"></i> Nuevo Registro';
    document.getElementById('editRowId').value = '';
    
    // Fix: Usar fecha local en lugar de UTC (evita salto de día después de las 7PM)
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    document.getElementById('inputDate').value = `${yyyy}-${mm}-${dd}`;
    
    document.getElementById('btnSubmit').innerHTML = '<i class="fa-solid fa-plus"></i> Agregar';
    window.setDropdownValue('GASTO NO FRECUENTE');
  }
}

function handleFormSubmit(e) {
  e.preventDefault();
  
  const rawAmount = inputAmount.value;
  const finalAmount = calculateExpression(rawAmount);
  
  if (finalAmount === null || isNaN(finalAmount)) {
    showToast('Por favor ingrese un monto válido', 'error');
    return;
  }

  let amountToSend = finalAmount;
  if (rawAmount.match(/[=+\-*/]/)) {
    if (rawAmount.trim().startsWith('=')) {
      amountToSend = rawAmount.trim();
    } else {
      if (rawAmount.match(/[+\-*/]/)) {
        amountToSend = '=' + rawAmount.trim();
      }
    }
  }

  const txData = {
    date: document.getElementById('inputDate').value,
    amount: amountToSend,
    detail: document.getElementById('inputDetail').value,
    type: inputType.value
  };
  
  const rowId = document.getElementById('editRowId').value;
  
  const submitBtn = document.getElementById('btnSubmit');
  const originalText = submitBtn.innerHTML;
  submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Procesando...';
  submitBtn.disabled = true;

  const finishEdit = (updatedTransaction) => {
    submitBtn.innerHTML = originalText;
    submitBtn.disabled = false;
    addModal.classList.add('hidden');
    addForm.reset();
    
    // ACTUALIZACIÓN LOCAL: Buscar y reemplazar en el cache
    if (updatedTransaction) {
      const index = transactionCache.findIndex(t => t.rowId === updatedTransaction.rowId);
      if (index > -1) {
        transactionCache[index] = updatedTransaction;
        sortAndRender();
        loadSummary();
      }
    }
    showToast('Cambios guardados correctamente', 'success');
  };
  
  const finishAdd = (newTransaction) => {
    submitBtn.innerHTML = originalText;
    submitBtn.disabled = false;
    addModal.classList.add('hidden');
    addForm.reset();
    
    if (newTransaction) {
      transactionCache.unshift(newTransaction);
      sortAndRender();
    }
    showToast('Registro agregado correctamente', 'success');
  };
  
  const handleError = (error) => {
    submitBtn.innerHTML = originalText;
    submitBtn.disabled = false;
    showToast('Error: ' + error.message, 'error');
  };
  
  if (editMode && rowId) {
    google.script.run
      .withSuccessHandler(finishEdit)
      .withFailureHandler(handleError)
      .editTransaction(rowId, txData);
  } else {
    google.script.run
      .withSuccessHandler(finishAdd)
      .withFailureHandler(handleError)
      .addTransactionOptimized(txData, currentMonth, currentYear);
  }
}

var dashPieIncome  = null;
var dashPieExpense = null;

function renderSummaryTable(data) {
  if (!data || data.length === 0) {
    document.getElementById('summaryTableBody').innerHTML =

    return;
  }
  
  Chart.register(ChartDataLabels);

  // ── Extract available years ──────────────────────────────────────────────
  const yearsSet = new Set();
  data.forEach(s => {
    if (!s.monthYear) return;
    const parts = s.monthYear.split(' ');
    if (parts.length >= 2) yearsSet.add(parts[parts.length - 1]);
  });
  const years = ['Todos'].concat(Array.from(yearsSet).sort().reverse());

  // Default to most-recent year on first render
  if (!summarySelectedYear || !years.includes(summarySelectedYear)) {
    summarySelectedYear = years[0];
  }

  // ── Year Chips ───────────────────────────────────────────────────────────
  const chipsEl = document.getElementById('summaryYearChips');
  chipsEl.innerHTML = '';
  years.forEach(yr => {
    const btn = document.createElement('button');
    btn.className = 'year-chip-btn' + (yr === summarySelectedYear ? ' active' : '');
    btn.textContent = yr;
    btn.addEventListener('click', () => {
      summarySelectedYear = yr;
      renderSummaryTable(summaries);
    });
    chipsEl.appendChild(btn);
  });

  // ── Filter data for selected year ────────────────────────────────────────
  const yearData = summarySelectedYear === 'Todos' ? data : data.filter(s => s.monthYear && s.monthYear.endsWith(summarySelectedYear));

  // ── KPI Aggregates ───────────────────────────────────────────────────────
  let totFreqInc = 0, totNoFreqInc = 0, totFreqExp = 0, totNoFreqExp = 0;

              dataArr.forEach(data => { sum += Number(data); });
              if (sum === 0) return '0%';
              let percentage = (value * 100 / sum).toFixed(1) + "%";
              return value > 0 ? percentage : '';
            },
            font: { weight: 'bold', size: 13, family: 'Outfit' }
          }
        },
        animation: { animateRotate: true, animateScale: true, duration: 900, easing: 'easeOutCubic' }
      }
    });
  }

  // ── Bar: Monthly Trend ───────────────────────────────────────────────────
  const trendCtx = document.getElementById('summaryTrendChart');
  if (trendCtx) {
    if (dashTrend) dashTrend.destroy();
    const mLabels = monthNames.map(m => m.substring(0, 3));
    const incData = new Array(12).fill(0);
    const expData = new Array(12).fill(0);

    yearData.forEach(s => {
      const mName = s.monthYear.split(' ')[0].toLowerCase().substring(0, 3);
      const idx = monthNames.findIndex(m => m.toLowerCase().startsWith(mName));
      if (idx > -1) {
        incData[idx] += (Number(s.freqIncome) || 0) + (Number(s.nonFreqIncome) || 0);
        expData[idx] += Math.abs(Number(s.totalExpense) || 0);
      }
    });

    const netData = incData.map((v, i) => v - expData[i]);

    Chart.register(ChartDataLabels);
    dashTrend = new Chart(trendCtx.getContext('2d'), {
      type: 'bar',
      data: {
        labels: mLabels,
        datasets: [
          { label: 'Ingresos', data: incData, backgroundColor: 'rgba(0,230,118,0.8)', borderRadius: 6, barPercentage: 0.6, order: 2 },
          { label: 'Gastos',   data: expData, backgroundColor: 'rgba(255,82,82,0.8)',  borderRadius: 6, barPercentage: 0.6, order: 2 },
          {
            label: 'Neto', data: netData, type: 'line',
            borderColor: '#ffd740', backgroundColor: 'rgba(255, 215, 64, 0.1)',
            borderWidth: 2.5, pointRadius: 4, pointBackgroundColor: '#ffd740',
            pointBorderColor: '#14172b', pointBorderWidth: 2,
            tension: 0.4, fill: true, order: 1
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'top', labels: { color: textMuted, font: { size: 11, family: 'Outfit' }, boxWidth: 12, padding: 14, usePointStyle: true, pointStyle: 'circle' } },
          tooltip: {
            backgroundColor: dashBg === '#f0f4f8' ? 'rgba(255,255,255,0.97)' : 'rgba(14,18,30,0.97)', titleColor: textBodyColor, bodyColor: textMuted,
            borderColor: getVar('--border-color'), borderWidth: 1, padding: 12, cornerRadius: 10,
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: S/ ${ctx.parsed.y.toFixed(2)}`,
              labelColor: ctx => ({ borderColor: ctx.dataset.borderColor || ctx.dataset.backgroundColor, backgroundColor: ctx.dataset.borderColor || ctx.dataset.backgroundColor })
            }
          },
          datalabels: { display: false }
        },
        scales: {
          y: { beginAtZero: true, grid: { color: getVar('--border-color-light').substring(0, 7) + '40', drawBorder: false }, ticks: { color: textMuted, font: { family: 'Outfit', size: 10 }, callback: v => 'S/' + (v >= 1000 ? (v/1000).toFixed(1)+'k' : v) }, border: { display: false } },
          x: { grid: { display: false }, ticks: { color: textMuted, font: { family: 'Outfit', size: 10 } }, border: { display: false } }
        },
        interaction: { mode: 'index', intersect: false },
        animation: { duration: 700, easing: 'easeOutQuart' }
      }
    });
  }

  // ── Detail Table ─────────────────────────────────────────────────────────
  const tbody = document.getElementById('summaryTableBody');
  tbody.innerHTML = '';
  yearData.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:500;">${row.monthYear}</td>
      <td class="amount-positive">${formatMoney(row.freqIncome)}</td>
      <td class="amount-positive">${formatMoney(row.nonFreqIncome)}</td>
      <td class="amount-negative">${formatMoney(row.freqExpense)}</td>
      <td class="amount-negative">${formatMoney(row.nonFreqExpense)}</td>
      <td class="amount-negative">${formatMoney(row.totalExpense)}</td>
      <td class="${row.netMonthly >= 0 ? 'amount-positive' : 'amount-negative'}" style="font-weight:700;">
        ${formatMoney(row.netMonthly)}
      </td>
    `;
    tbody.appendChild(tr);
  });
  
  // Refresh header stats
  sortAndRender();
}


// ============================================
// THEME LOGIC
// ============================================
function initTheme() {
  if (currentTheme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
}

function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('bucks_theme', currentTheme);
  
  initTheme();
  
  // Re-render charts so they pick up new CSS variables
  if (document.getElementById('view-charts').classList.contains('active')) {
    renderCharts();
  }
  if (document.getElementById('view-summary').classList.contains('active')) {
    renderSummaryTable(summaries);
  }
}

// ============================================
// FREQ INCOME LOGIC
// ============================================
window.openFreqIncomeModal = function() {
  const currMonthYearStr = monthNames[currentMonth] + " " + currentYear;
  freqIncomeMonthLabel.textContent = `(${currMonthYearStr})`;
  
  let currentVal = 0;
  if (summaries && summaries.length > 0) {
    const summaryRow = summaries.find(s => s.monthYear === currMonthYearStr);
    if (summaryRow) currentVal = Number(summaryRow.freqIncome) || 0;
  }
  
  inputFreqIncomeAmount.value = currentVal.toFixed(2);
  freqIncomeModal.classList.remove('hidden');
};

function handleFreqIncomeSubmit(e) {
  e.preventDefault();
  
  const amount = Number(inputFreqIncomeAmount.value);
  if (isNaN(amount) || amount < 0) {
    showToast('Ingrese un monto válido referencialmente', 'error');
    return;
  }
  
  const currMonthYearStr = monthNames[currentMonth] + " " + currentYear;
  
  const submitBtn = document.getElementById('btnSaveFreqIncome');
  const ogText = submitBtn.innerHTML;
  submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
  submitBtn.disabled = true;
  
  google.script.run
    .withSuccessHandler((res) => {
      submitBtn.innerHTML = ogText;
      submitBtn.disabled = false;
      freqIncomeModal.classList.add('hidden');
      
      // Optimizacion: actualizar array local summaries inmediatamente
      if (summaries) {
        const row = summaries.find(s => s.monthYear === currMonthYearStr);
        if (row) {
           row.freqIncome = amount;
           // force re-calc local fields
           row.totalIncome = amount + Number(row.nonFreqIncome);
           row.netMonthly = row.totalIncome + Number(row.totalExpense);
        }
      }
      
      showToast(res.message || 'Actualizado correctamente', 'success');
      renderSummaryTable(summaries); // Refresca y trigger sortAndRender headers
    })
    .withFailureHandler((err) => {
      submitBtn.innerHTML = ogText;
      submitBtn.disabled = false;
      showToast('Error: ' + err.message, 'error');
    })
    .updateFreqIncome(currMonthYearStr, amount);
}

// ============================================
// CHARTS - CORREGIDO
// ============================================
function renderCharts() {
  const chartContainer = document.querySelector('.chart-container');
  if (!chartContainer) return;
  if (!summaries || summaries.length === 0) return;

  const metricSelect = document.getElementById('chartMetricSelect');
  const metric = metricSelect ? metricSelect.value : 'comparison';
  const isMobile = window.innerWidth <= 768;

  // Build year-keyed data
  const yearsData = {}, incomeData = {}, expenseData = {};
  const allYears = new Set();

  summaries.forEach(s => {
    if (!s.monthYear) return;
    const parts = s.monthYear.split(' ');
    if (parts.length < 2) return;
    const mName = parts[0], yearStr = parts[parts.length - 1];
    if (!yearStr.match(/^\d{4}$/)) return;
    const mIdx = monthNames.findIndex(m => m.toLowerCase().startsWith(mName.toLowerCase().substring(0, 3)));
    if (mIdx < 0) return;
    allYears.add(yearStr);
    if (!yearsData[yearStr])   yearsData[yearStr]   = new Array(12).fill(0);
    if (!incomeData[yearStr])  incomeData[yearStr]  = new Array(12).fill(0);
    if (!expenseData[yearStr]) expenseData[yearStr] = new Array(12).fill(0);
    incomeData[yearStr][mIdx]  = (Number(s.freqIncome) || 0) + (Number(s.nonFreqIncome) || 0);
    expenseData[yearStr][mIdx] = Math.abs(Number(s.totalExpense) || 0);
    const mm = { totalExpense: Math.abs(Number(s.totalExpense)), freqExpense: Math.abs(Number(s.freqExpense)), nonFreqExpense: Math.abs(Number(s.nonFreqExpense)),
                 totalIncome: incomeData[yearStr][mIdx], freqIncome: Number(s.freqIncome)||0, nonFreqIncome: Number(s.nonFreqIncome)||0, netMonthly: Number(s.netMonthly)||0 };
    yearsData[yearStr][mIdx] = mm[metric] ?? 0;
  });

  const sortedYears = Array.from(allYears).sort();
  const mLabels = monthNames.map(m => m.substring(0, 3));
  
  // Premium Colors & Utilities
  const ctx = document.createElement('canvas').getContext('2d');
  const getGradient = (color1, color2) => {
    const grd = ctx.createLinearGradient(0, 0, 0, 400);
    grd.addColorStop(0, color1);
    grd.addColorStop(1, color2);
    return grd;
  };

  const palette = [
    { main: '#448aff', light: '#82b1ff' }, // Blue
    { main: '#00e676', light: '#69f0ae' }, // Green
    { main: '#ff5252', light: '#ff8a80' }, // Red
    { main: '#ffd740', light: '#ffe57f' }, // Yellow
    { main: '#e040fb', light: '#ea80fc' }, // Purple
    { main: '#ffab40', light: '#ffd180' }  // Orange
  ];

  let datasets = [];
  if (metric === 'comparison') {
    sortedYears.forEach((yr, i) => {
      const p = palette[i % palette.length];
      datasets.push({ 
        label: `Ingresos ${yr}`, 
        data: incomeData[yr], 
        backgroundColor: 'rgba(0, 230, 118, 1)',
        borderColor: '#00e676', borderWidth: 1, borderRadius: 4, barPercentage: 0.8, categoryPercentage: 0.7, order: 2 
      });
      datasets.push({ 
        label: `Gastos ${yr}`, 
        data: expenseData[yr].map(v => -v), 
        backgroundColor: 'rgba(255, 82, 82, 1)',
        borderColor: '#ff5252', borderWidth: 1, borderRadius: 4, barPercentage: 0.8, categoryPercentage: 0.7, order: 2 
      });
    });
    const lineColors = ['#ffd740','#e040fb','#00b0ff','#ffab40'];
    sortedYears.forEach((yr, i) => {
      const lc = lineColors[i % lineColors.length];
      const netVals = incomeData[yr].map((v,j) => v - expenseData[yr][j]);
      datasets.push({ 
        label:`Neto ${yr}`, data: netVals, type:'line', borderColor:lc, backgroundColor:lc+'22', 
        borderWidth:3, pointRadius:4, pointHoverRadius:6, pointBackgroundColor:lc, pointBorderColor:'#14172b', 
        pointBorderWidth:2, tension:0.4, fill:true, order:1 
      });
    });
  } else {
    const metricColors = { 
       totalExpense: palette[2], freqExpense: palette[2], nonFreqExpense: palette[3],
       totalIncome: palette[1], freqIncome: palette[0], nonFreqIncome: palette[4], netMonthly: palette[5] 
    };
    const c = metricColors[metric] || palette[0];
    sortedYears.forEach((yr, i) => {
      const p = sortedYears.length === 1 ? c : palette[i % palette.length];
      datasets.push({
        label: yr,
        data: yearsData[yr],
        backgroundColor: p.main,
        borderColor: p.main,
        borderWidth: 1.5,
        borderRadius: 4,
        barPercentage: sortedYears.length > 3 ? 0.9 : 0.7,
        categoryPercentage: 0.8,
        barThickness: isMobile ? 12 : undefined
      });
    });
  }

  chartContainer.innerHTML = `<div class="chart-scroll-wrapper" style="overflow-x: auto; height: 100%; padding-bottom: 5px;"><canvas id="annualChart"></canvas></div>`;
  const canvas = document.getElementById('annualChart');
  if (isMobile) {
    const minW = Math.max(640, datasets.length * (sortedYears.length > 1 ? 80 : 50));
    canvas.style.minWidth = minW + 'px';
  }

  if (myChart) myChart.destroy();
  Chart.register(ChartDataLabels);

  const getVar = (name) => getComputedStyle(document.body).getPropertyValue(name).trim() || '#fff';
  const textBodyColor = getVar('--text-primary');
  const textMuted = getVar('--text-secondary');
  const tooltipBg = currentTheme === 'light' ? 'rgba(255,255,255,0.95)' : 'rgba(10,14,28,0.95)';
  const titles = {
    comparison: 'Comparativa de ingresos vs gastos por año',
    totalExpense: 'Comparativa de gastos totales por año',
    freqExpense: 'Comparativa de Gasto Frecuente por año',
    nonFreqExpense: 'Comparativa de Gasto No Frecuente por año',
    totalIncome: 'Comparativa de ingresos totales por año',
    freqIncome: 'Comparativa de Ingreso Frecuente por año',
    nonFreqIncome: 'Comparativa de Ingreso No Frecuente por año',
    netMonthly: 'Evolución del balance neto anual'
  };

  myChart = new Chart(canvas.getContext('2d'), {
    type: 'bar',
    data: { labels: mLabels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: isMobile ? 40 : 20, bottom: 10, left: 10, right: 10 } },
      plugins: {
        legend: {
          display: true, position: 'top', align: isMobile ? 'start' : 'center',
          labels: { color: textMuted, usePointStyle:true, pointStyle:'circle', font:{ size:isMobile?10:12, family:'Outfit' }, padding:15, boxWidth:8 }
        },
        title: {
          display: true, text: titles[metric] || 'Gráfico', color: textBodyColor,
          align: isMobile ? 'start' : 'center',
          font:{ size:isMobile?15:18, weight:'700', family:'Outfit' }, padding:{ bottom:30 }
        },
        tooltip: {
          backgroundColor: tooltipBg, titleColor: textBodyColor, bodyColor: textMuted,
          borderColor: getVar('--border-color'), borderWidth: 1, padding: 12, cornerRadius: 10,
          callbacks: { label: ctx => ` ${ctx.dataset.label}: S/ ${Math.abs(ctx.parsed.y).toFixed(2)}` }
        },
        datalabels: {
          display: (ctx) => {
            return Math.abs(ctx.dataset.data[ctx.dataIndex]) > 0;
          },
          anchor: 'end',
          align: 'end',
          offset: 4,
          color: currentTheme === 'light' ? '#1e293b' : '#ffffff',
          backgroundColor: currentTheme === 'light' ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0.5)',
          borderColor: currentTheme === 'light' ? 'rgba(0,0,0,0.08)' : 'transparent',
          borderWidth: currentTheme === 'light' ? 1 : 0,
          borderRadius: 4,
          padding: 3,
          font: { size: isMobile ? 10 : 12, weight: '700', family: 'Outfit' },
          formatter: v => 'S/' + Math.abs(v).toFixed(0),
          rotation: -45
        }
      },
      scales: {
        y: {
          beginAtZero: true, grid: { color: getVar('--border-color-light').substring(0, 7) + '40', drawBorder:false },
          ticks: { 
            color: textMuted, font:{ size:isMobile?9:11, family:'Outfit' }, 
            callback: v => 'S/'+(Math.abs(v)>=1000?(Math.abs(v)/1000).toFixed(1)+'k':Math.abs(v)) 
          }
        },
        x: { grid:{ display:false }, ticks:{ color: textMuted, font:{ size:isMobile?10:11, family:'Outfit' } } }
      },
      interaction: { mode:'index', intersect:false },
      animation: { duration:1000, easing:'easeOutQuart' }
    }
  });
}
</script>
